name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    name: Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend (for embed)
        run: |
          cd web
          npm install --no-audit --no-fund
          npm run build
          mkdir -p ../internal/webui/dist
          cp -r dist/* ../internal/webui/dist/

      - name: Build
        run: go build ./cmd/... ./internal/...

      - name: Test
        run: go test ./cmd/... ./internal/... ./test/...

  lint:
    name: Lint (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend (for embed)
        run: |
          cd web
          npm install --no-audit --no-fund
          npm run build
          mkdir -p ../internal/webui/dist
          cp -r dist/* ../internal/webui/dist/

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Svelte check
        run: npm run check

      - name: Test
        run: npx vitest run

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
