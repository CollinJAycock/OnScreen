name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    name: Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend (for embed)
        run: |
          cd web
          npm install --no-audit --no-fund
          npm run build
          mkdir -p ../internal/webui/dist
          cp -r dist/* ../internal/webui/dist/

      - name: Build
        run: go build ./cmd/... ./internal/...

      - name: Test
        run: go test ./cmd/... ./internal/... ./test/...

      # Integration tests spin up real Postgres via testcontainers. Gated
      # behind a build tag so contributors without Docker can still run the
      # default suite, but every PR exercises the SQL paths against pg.
      - name: Integration tests
        run: go test -tags=integration -timeout 10m ./internal/...

      # Race detector on the concurrency-heavy packages — broker pubsub,
      # transcode dispatcher, scheduler, valkey lock + master-election,
      # streaming session tracker. -race needs cgo so we install gcc;
      # scoping to the packages that actually exercise goroutines keeps
      # CI time bounded vs running -race across the whole repo.
      - name: Race detector
        run: |
          go test -race -timeout 5m \
            ./internal/notification/... \
            ./internal/streaming/... \
            ./internal/scheduler/... \
            ./internal/valkey/... \
            ./internal/worker/... \
            ./internal/transcode/...

  lint:
    name: Lint (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend (for embed)
        run: |
          cd web
          npm install --no-audit --no-fund
          npm run build
          mkdir -p ../internal/webui/dist
          cp -r dist/* ../internal/webui/dist/

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Svelte check
        run: npm run check

      - name: Test
        run: npx vitest run

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  govulncheck:
    name: govulncheck (Go)
    runs-on: ubuntu-latest
    # Advisory only: Dependabot drives the actual fixes; we still want the
    # report visible on every PR so reviewers know if a change pulls in a new
    # known-vulnerable transitive dep.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Scan
        run: govulncheck ./...

  npm-audit:
    name: npm audit (web)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json

      # Fail only on high/critical advisories — moderate/low get reviewed
      # by Dependabot PRs without blocking unrelated CI runs.
      - name: Audit
        run: npm audit --omit=dev --audit-level=high
