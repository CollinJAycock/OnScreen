version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - govet
    - ineffassign
    - staticcheck
    - unused
    - exhaustive
    - bodyclose
    - sqlclosecheck
    - rowserrcheck
    - noctx
  settings:
    exhaustive:
      default-signifies-exhaustive: true
    staticcheck:
      checks:
        - all
        - -QF1001
        - -QF1002
        - -QF1012
        - -S1009
        - -S1016
        - -ST1000
        - -ST1003
        - -SA1019
  exclusions:
    rules:
      - path: internal/db/gen/
        linters:
          - govet
          - ineffassign
          - staticcheck
          - unused
          - exhaustive
          - bodyclose
          - sqlclosecheck
          - rowserrcheck
          - noctx
      - path: web/node_modules/
        linters:
          - exhaustive
      - path: _test\.go
        linters:
          - bodyclose
          - noctx
          - staticcheck
      - path: test/
        linters:
          - bodyclose
          - noctx

formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/onscreen/onscreen
