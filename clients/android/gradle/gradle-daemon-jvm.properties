#
# Gradle Daemon JVM Criteria.
#
# Declares the JVM the build expects so Gradle 8.13+ auto-detects a
# matching local install or downloads one (Adoptium/Azul/etc. via
# Foojay) instead of the user having to set JAVA_HOME on every
# invocation. Aligns the CLI and Android Studio daemons so both
# share one process — faster, fewer "Unable to load class" sync
# breaks from version drift between IDE-bundled JBR and CLI JDK.
#
# Daemon JVM is the runtime that executes the build itself; the
# bytecode target (`JavaVersion.VERSION_17` and `jvmTarget = "17"`
# in app/build.gradle.kts) is independent and can be lower than the
# daemon JVM. We set 21 here because Android Studio Iguana+ ships
# JBR 21, so a fresh checkout works without auto-provisioning.
# Auto-provisioning of older JDKs through the daemon-JVM channel
# requires the `updateDaemonJvm` task, not Foojay convention; not
# worth adding a network dependency just to use 17.
#
# Vendor and implementation are intentionally omitted: omitting
# means "any vendor / any implementation," which matches the
# Android Studio bundled JBR (vendor=JetBrains s.r.o., OpenJDK-
# based). Setting `toolchainVendor=ANY` looks correct but Gradle
# parses it as a literal vendor name to match — no such vendor →
# falls through to the auto-download path.
toolchainVersion=21
