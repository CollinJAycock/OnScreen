<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="OnScreen — Open-source media server" />
    <link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="%sveltekit.assets%/favicon-96x96.png" type="image/png" sizes="96x96" />
    <link rel="icon" href="%sveltekit.assets%/favicon.ico" sizes="48x48" />
    <link rel="apple-touch-icon" href="%sveltekit.assets%/apple-touch-icon.png" />
    <link rel="manifest" href="%sveltekit.assets%/site.webmanifest" />
    <meta name="theme-color" content="#07070d" />
    <script>
      (function() {
        var t = localStorage.getItem('onscreen-theme') || 'system';
        if (t === 'system') t = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        document.documentElement.dataset.theme = t;
        if (t === 'light') document.querySelector('meta[name="theme-color"]').content = '#f5f5f7';
      })();
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div id="svelte">%sveltekit.body%</div>
  </body>
</html>
