                      id: { type: string, format: uuid }

  /api/v1/items/{id}/subtitles/ocr:
    parameters: [{ $ref: '#/components/parameters/UUID' }]
    post:
      summary: Enqueue an OCR job for a PGS/VobSub track
      description: |
        v2.1 Track A. Returns immediately with a job ID; OCR runs in
        a server-lifetime goroutine. Client polls
        `/api/v1/items/{id}/subtitles/ocr/{jobId}` for status. Async
        because OCR can take minutes — synchronous behaviour 524'd
        behind reverse proxies with sub-multi-minute timeouts
        (Cloudflare Tunnel free tier = 100 s).
      tags: [Subtitles]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [stream_index]
              properties:
                stream_index: { type: integer }
                language:     { type: string }
      responses:
        '202':
          description: Job enqueued.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:        { type: string, format: uuid }
                      status:    { type: string, enum: [pending, running, complete, failed] }
                      created_at: { type: string, format: date-time }

  /api/v1/items/{id}/subtitles/ocr/{jobId}:
    parameters:
      - { $ref: '#/components/parameters/UUID' }
      - { in: path, name: jobId, required: true, schema: { type: string, format: uuid } }
    get:
      summary: Poll OCR job status (v2.1)
      tags: [Subtitles]
      responses:
        '200':
          description: Job status. `complete` jobs include the resulting subtitle id.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:           { type: string, format: uuid }
                      status:       { type: string, enum: [pending, running, complete, failed] }
                      created_at:   { type: string, format: date-time }
                      completed_at: { type: string, format: date-time, nullable: true }
                      error:        { type: string, nullable: true }
                      subtitle_id:  { type: string, format: uuid, nullable: true }
        '404': { description: Job not found (TTL expired or never enqueued). }

  /api/v1/items/{id}/subtitles/{subId}:
    parameters:
      - { $ref: '#/components/parameters/UUID' }
      - { in: path, name: subId, required: true, schema: { type: string, format: uuid } }
    delete:
