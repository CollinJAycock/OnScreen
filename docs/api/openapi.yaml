      responses:
        '204': { description: Sent. }

  /api/v1/fs/browse:
    get:
      summary: Browse server filesystem (admin)
      description: Used by the library wizard to pick scan paths.
      tags: [Settings]
      parameters:
        - { in: query, name: path, schema: { type: string }, description: 'Absolute path; empty lists volume roots.' }
      responses:
        '200':
          description: Directory listing.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      path:    { type: string }
                      entries:
                        type: array
                        items:
                          type: object
                          properties:
                            name:  { type: string }
                            path:  { type: string }
                            is_dir: { type: boolean }

  /api/v1/arr/webhook:
    post:
      summary: Sonarr/Radarr webhook ingestion
      description: Authenticated by an arr API-key shared secret, not user auth.
      tags: [Arr]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, additionalProperties: true }
      responses:
        '204': { description: Accepted. }

  /api/v1/admin/arr-services:
    get:
      summary: List configured arr services
      tags: [ArrServices]
      responses:
        '200':
          description: List of arr services. api_key is never returned; api_key_set indicates whether one is stored.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/ArrService' }
                  meta: { $ref: '#/components/schemas/ListMeta' }
    post:
      summary: Add a new arr service
      tags: [ArrServices]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ArrServiceCreate' }
      responses:
        '201':
          description: Created.
          content:
            application/json:
              schema:
                type: object
                properties: { data: { $ref: '#/components/schemas/ArrService' } }
        '400': { description: Validation error. }

  /api/v1/admin/arr-services/probe:
    post:
      summary: Probe an arr instance for connection metadata + dropdown options
      description: |
        Calls Ping + QualityProfiles + RootFolders + Tags (+ LanguageProfiles for sonarr)
        in one round-trip. Used by the admin UI to populate the create/edit form. Pass
        service_id to reuse the stored API key when editing a saved row.
      tags: [ArrServices]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                kind:        { type: string, enum: [radarr, sonarr] }
                base_url:    { type: string }
                api_key:     { type: string }
                service_id:  { type: string, format: uuid, nullable: true }
      responses:
        '200':
          description: Probe result.
          content:
            application/json:
              schema:
                type: object
                properties: { data: { $ref: '#/components/schemas/ArrProbeResult' } }
        '400': { description: Validation or upstream error. }

  /api/v1/admin/arr-services/{id}:
    parameters:
      - $ref: '#/components/parameters/UUID'
    get:
      summary: Get one arr service
      tags: [ArrServices]
      responses:
        '200':
          description: Service.
          content:
            application/json:
              schema:
                type: object
                properties: { data: { $ref: '#/components/schemas/ArrService' } }
        '404': { description: Not found. }
    patch:
      summary: Update an arr service
      description: |
        Partial update — every field is optional. Send `api_key` only when rotating
        the credential; an omitted or empty `api_key` keeps the existing value.
        `is_default` is intentionally not settable here — use /set-default.
      tags: [ArrServices]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ArrServiceUpdate' }
      responses:
        '200':
          description: Updated.
          content:
            application/json:
              schema:
                type: object
                properties: { data: { $ref: '#/components/schemas/ArrService' } }
        '404': { description: Not found. }
    delete:
      summary: Delete an arr service
      description: |
        In-flight requests bound to this service have their service_id set NULL via
        FK ON DELETE SET NULL — they survive but the admin must re-route them.
      tags: [ArrServices]
      responses:
        '204': { description: Deleted. }

  /api/v1/admin/arr-services/{id}/set-default:
    parameters:
      - $ref: '#/components/parameters/UUID'
    post:
      summary: Mark this service as the default for its kind
      description: |
        Atomically clears any existing default for this kind, then sets the flag on
        this row. The unique partial index on (kind) WHERE is_default enforces the
        invariant of at most one default per kind.
      tags: [ArrServices]
      responses:
        '200':
          description: Updated service.
          content:
            application/json:
              schema:
                type: object
                properties: { data: { $ref: '#/components/schemas/ArrService' } }

  /api/v1/discover/search:
    get:
      summary: TMDB search-multi enriched with library + request state
      description: |
        Returns up to `limit` titles from TMDB. Each row is decorated with whether
        the title is already in the user's library (`in_library`, `library_item_id`)
        and whether the calling user already has an open request for it
        (`has_active_request`, `active_request_id`, `active_request_status`).
        Returns 503 with code TMDB_UNAVAILABLE when no TMDB key is configured.
      tags: [Discover]
      parameters:
        - in: query
          name: q
          required: true
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 50, default: 20 }
      responses:
        '200':
          description: Discover results.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/DiscoverItem' }
        '400': { description: Missing query. }
        '503': { description: TMDB not configured. }

  /api/v1/requests:
    get:
      summary: List requests
      description: |
        Default scope is the calling user's own history. Admins may pass
        `scope=all` to see the full server queue. Optional `status` filter narrows
        to a single state.
      tags: [Requests]
      parameters:
        - in: query
          name: scope
          schema: { type: string, enum: [mine, all], default: mine }
        - in: query
          name: status
          schema: { type: string, enum: [pending, approved, declined, downloading, available, failed] }
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: List of requests.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/MediaRequest' }
                  meta: { $ref: '#/components/schemas/ListMeta' }
        '403': { description: scope=all is admin-only. }
    post:
      summary: Submit a new request
      tags: [Requests]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, tmdb_id]
              properties:
                type:                  { type: string, enum: [movie, show] }
                tmdb_id:               { type: integer }
                seasons:
                  description: Optional season numbers for show requests; omit for full series.
                  type: array
                  items: { type: integer }
                requested_service_id:  { type: string, format: uuid, nullable: true, description: User's preferred arr service (e.g. 4K vs 1080p). Admin can override at approve time. }
                quality_profile_id:    { type: integer, nullable: true }
                root_folder:           { type: string,  nullable: true }
      responses:
        '201':
          description: Request created.
          content:
            application/json:
              schema:
                type: object
                properties: { data: { $ref: '#/components/schemas/MediaRequest' } }
        '400': { description: Validation error. }
        '409': { description: Already an active request for this title. }

  /api/v1/requests/{id}:
    parameters:
      - $ref: '#/components/parameters/UUID'
    get:
      summary: Get a request (owner or admin)
      tags: [Requests]
      responses:
        '200':
          description: Request.
          content:
            application/json:
              schema:
                type: object
                properties: { data: { $ref: '#/components/schemas/MediaRequest' } }
        '403': { description: Not the owner. }
        '404': { description: Not found. }

  /api/v1/requests/{id}/cancel:
    parameters:
      - $ref: '#/components/parameters/UUID'
    post:
      summary: Withdraw a still-pending request (owner only)
      tags: [Requests]
      responses:
        '204': { description: Cancelled. }
        '403': { description: Not the owner. }
        '409': { description: Request is already decided and cannot be cancelled. }

  /api/v1/admin/requests/{id}/approve:
    parameters:
      - $ref: '#/components/parameters/UUID'
    post:
      summary: Approve a pending request and dispatch it to the arr service
      description: |
        Body fields override the per-request and per-service defaults at approval
        time — useful when redirecting a request to a different arr instance than
        the user originally chose.
      tags: [Requests]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                service_id:         { type: string, format: uuid, nullable: true }
                quality_profile_id: { type: integer, nullable: true }
                root_folder:        { type: string,  nullable: true }
      responses:
        '200':
          description: Approved.
          content:
            application/json:
              schema:
                type: object
                properties: { data: { $ref: '#/components/schemas/MediaRequest' } }
        '400': { description: No arr service configured / mismatched / disabled / arr add failed. }
        '409': { description: Request is no longer pending. }

  /api/v1/admin/requests/{id}/decline:
    parameters:
      - $ref: '#/components/parameters/UUID'
    post:
      summary: Decline a pending request
      tags: [Requests]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: { type: string, description: Optional message shown to the requester. }
      responses:
        '200':
          description: Declined.
          content:
            application/json:
              schema:
                type: object
                properties: { data: { $ref: '#/components/schemas/MediaRequest' } }
        '409': { description: Request is no longer pending. }

  /api/v1/admin/requests/{id}:
    parameters:
      - $ref: '#/components/parameters/UUID'
    delete:
      summary: Hard-delete a request (admin escape hatch)
      description: Does not contact the upstream arr instance — only the OnScreen row goes away.
      tags: [Requests]
      responses:
        '204': { description: Deleted. }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: paseto-v4
    cookieAuth:
      type: apiKey
      in: cookie
      name: os_access

  parameters:
    UUID:
      in: path
      name: id
      required: true
      schema: { type: string, format: uuid }
    Limit:
      in: query
      name: limit
      schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
    Offset:
      in: query
      name: offset
      schema: { type: integer, minimum: 0, default: 0 }
    ViewAs:
      in: query
      name: view_as
      required: false
      description: |
        v2.1 Track G item 5. Admin "view as" — when an admin appends
        `?view_as=<uuid>` to any GET request the auth middleware swaps
        the request's claims for the target user's, so handlers see
        exactly what the target would see (own grants, content-rating
        ceiling, IsAdmin downgraded). Read-only by design — non-GET
        requests with the param return 403. Unknown target IDs return
        404 to prevent ID-probing. Useful for verifying the per-user
        policy stack end-to-end without PIN-switching.
      schema: { type: string, format: uuid }

  responses:
    BoolEnabled:
      description: Boolean visibility flag.
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                type: object
                properties:
                  enabled: { type: boolean }
    BadRequest:
      description: Malformed request.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    Unauthorized:
      description: Missing or invalid credentials.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    Forbidden:
      description: Caller is authenticated but not allowed.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    Conflict:
      description: Duplicate or state conflict.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  schemas:
    # ── Envelopes ──────────────────────────────────────────────────────────
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:       { type: string, description: 'UPPER_SNAKE_CASE machine code.' }
            message:    { type: string }
            request_id: { type: string }
    ListEnvelope:
      type: object
      properties:
        data:
          type: array
          items: {}
        meta:
          type: object
          properties:
            total:  { type: integer, format: int64, description: '`-1` when total is unknown (load-more pagination).' }
            cursor: { type: string }

    # ── Auth ───────────────────────────────────────────────────────────────
    TokenPair:
      type: object
      properties:
        access_token:  { type: string }
        refresh_token: { type: string }
        expires_at:    { type: string, format: date-time }
        user_id:       { type: string, format: uuid }
        username:      { type: string }
        is_admin:      { type: boolean }
    TokenPairEnvelope:
      type: object
      properties:
        data: { $ref: '#/components/schemas/TokenPair' }
    UserInfo:
      type: object
      properties:
        id:       { type: string, format: uuid }
        username: { type: string }
        is_admin: { type: boolean }

    # ── Pairing ────────────────────────────────────────────────────────────
    PairCodeResponse:
      type: object
      properties:
        pin:           { type: string, minLength: 6, maxLength: 6 }
        device_token:  { type: string, format: uuid }
        expires_in:    { type: integer, description: 'Seconds until expiry.' }
        poll_interval: { type: integer, description: 'Suggested poll interval, seconds.' }
    PairPollResponse:
      type: object
      properties:
        status: { type: string, enum: [pending, claimed, expired] }
        tokens: { $ref: '#/components/schemas/TokenPair' }

    # ── System ─────────────────────────────────────────────────────────────
    SetupStatusEnvelope:
      type: object
      properties:
        data:
          type: object
          properties:
            user_count:  { type: integer, format: int64 }
            initialized: { type: boolean }
    CapabilitiesEnvelope:
      type: object
      properties:
        data:
          type: object
          properties:
            server:
              type: object
              properties:
                name:       { type: string }
                machine_id: { type: string }
                version:    { type: string }
                started_at: { type: string, format: date-time }
            features:
              type: object
              properties:
                transcode:          { type: boolean }
                trickplay:          { type: boolean }
                subtitles_external: { type: boolean }
                subtitles_ocr:      { type: boolean }
                oidc:               { type: boolean }
                ldap:               { type: boolean }
                device_pairing:     { type: boolean }
                plugins:            { type: boolean }
                backup:             { type: boolean }
                people_credits:     { type: boolean }
                photos:             { type: boolean }
                music:              { type: boolean }
                webhooks:           { type: boolean }
                notifications:      { type: boolean }
            limits:
              type: object
              properties:
                max_request_bytes:  { type: integer }
                max_artwork_dim:    { type: integer }
                max_pagination:     { type: integer }
            discovery:
              type: object
              properties:
                enabled: { type: boolean }
                port:    { type: integer }

    # ── Libraries / items ──────────────────────────────────────────────────
    Library:
      type: object
      properties:
        id:           { type: string, format: uuid }
        name:         { type: string }
        type:
          type: string
          enum: [movie, show, anime, music, photo, mixed, audiobook, podcast, music_video, home_video, book, dvr]
        scan_paths:   { type: array, items: { type: string } }
        item_count:   { type: integer, format: int64 }
        is_private:
          type: boolean
          description: |
            v2.1. When false (default) every authenticated user can see
            this library. When true, access requires an explicit row in
            `library_access`. Admins always bypass the check.
        auto_grant_new_users:
          type: boolean
          description: |
            v2.1. When true on a private library, every newly-created
            non-admin user (invite accept, OIDC/SAML/LDAP JIT
            provisioning, admin-create) is automatically granted
            access. No-op on public libraries — the UI hides the
            toggle there since the grant is meaningless.
        created_at:   { type: string, format: date-time }
        updated_at:   { type: string, format: date-time }
    LibraryListEnvelope:
      type: object
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/Library' }
    LibraryCreate:
      type: object
      required: [name, type, scan_paths]
      properties:
        name:       { type: string }
        type:
          type: string
          enum: [movie, show, anime, music, photo, mixed, audiobook, podcast, music_video, home_video, book, dvr]
        scan_paths: { type: array, items: { type: string } }
        is_private: { type: boolean, default: false }
        auto_grant_new_users:
          type: boolean
          default: false
          description: Server silently drops to false on public libraries (is_private=false).
    LibraryUpdate:
      type: object
      description: |
        True PATCH semantics (since 2026-05-03): every field is
        optional and falls back to the current row's value. Sending
        `{"is_private": true}` alone is sufficient to flip the flag;
        no need to round-trip the whole library. Unknown fields are
        rejected with HTTP 400 (DisallowUnknownFields) so a typo
        like `is-private` returns a clear error instead of silently
        being dropped.
      properties:
        name:       { type: string }
        scan_paths: { type: array, items: { type: string } }
        agent:      { type: string, description: 'Metadata agent slug (e.g. tmdb, tvdb, musicbrainz, openlibrary, none).' }
        language:   { type: string, description: 'ISO 639-1 code, e.g. "en" / "ja". Used by the metadata agent.' }
        scan_interval_minutes:        { type: integer, description: 'Minutes between auto-scans. Mutually exclusive with scan_interval_ns; minutes wins if both set.' }
        scan_interval_ns:             { type: integer, format: int64, description: 'Scan interval in nanoseconds (Go time.Duration).' }
        metadata_refresh_interval_ns: { type: integer, format: int64, description: 'Metadata refresh interval in nanoseconds (Go time.Duration).' }
        is_private:
          type: boolean
          nullable: true
          description: PATCH semantics — omit to preserve current value, send true/false to flip.
        auto_grant_new_users:
          type: boolean
          nullable: true
    GenreCount:
      type: object
      properties:
        genre: { type: string }
        count: { type: integer, format: int64 }
    YearCount:
      type: object
      properties:
        year:  { type: integer }
        count: { type: integer, format: int64 }
    MediaItem:
      type: object
      properties:
        id:           { type: string, format: uuid }
        library_id:   { type: string, format: uuid }
        title:        { type: string }
        type:         { type: string }
        year:         { type: integer, nullable: true }
        summary:      { type: string, nullable: true }
        rating:       { type: number, format: float, nullable: true }
        duration_ms:  { type: integer, format: int64, nullable: true }
        poster_path:  { type: string, nullable: true }
        thumb_path:   { type: string, nullable: true }
        content_rating: { type: string, nullable: true }
    MediaItemListEnvelope:
      type: object
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/MediaItem' }
        meta:
          type: object
          properties:
            total:  { type: integer, format: int64 }
            cursor: { type: string }
    AudioStream:
      type: object
      properties:
        index:    { type: integer }
        codec:    { type: string }
        channels: { type: integer }
        language: { type: string }
        title:    { type: string }
    SubtitleStream:
      type: object
      properties:
        index:    { type: integer }
        codec:    { type: string }
        language: { type: string }
        title:    { type: string }
        forced:   { type: boolean }
    ExternalSubtitle:
      type: object
      properties:
        id:       { type: string, format: uuid }
        language: { type: string }
        format:   { type: string }
        url:      { type: string }
    Chapter:
      type: object
      properties:
        title:    { type: string }
        start_ms: { type: integer, format: int64 }
        end_ms:   { type: integer, format: int64 }
    Marker:
      type: object
      properties:
        kind:     { type: string, enum: [intro, recap, credits] }
        start_ms: { type: integer, format: int64 }
        end_ms:   { type: integer, format: int64 }
        source:   { type: string }
    ItemFile:
      type: object
      properties:
        id:                { type: string, format: uuid }
        stream_url:        { type: string }
        stream_token:
          type: string
          description: |
            v2.1. PASETO v4.local token, 24 h TTL, file_id-bound, with
            `purpose="stream"` claim. Native players (ExoPlayer, Roku
            Video, Tizen AVPlay, mpv) bypass the OkHttp / fetch token-
            refresh paths, so a 1 h access token used to expire mid-
            stream and surface as ERROR_CODE_IO_BAD_HTTP_STATUS on the
            next range request — this token replaces it on
            `?token=…` query auth (no Bearer header on the asset
            routes). Boundaries enforced server-side: (1) the embedded
            file_id claim must match the URL `{id}`, so a leaked URL
            can't be repurposed across files; (2) the purpose=stream
            claim is rejected on `/api/v1/*` Bearer auth, so a leaked
            stream URL grants only file-scoped read, not general API
            access. A fresh token is minted on every `/items/{id}`
            response (no server-side caching) so clients can refresh
            without a server restart.
        container:         { type: string, nullable: true }
        video_codec:       { type: string, nullable: true }
        audio_codec:       { type: string, nullable: true }
        resolution_w:      { type: integer, nullable: true }
        resolution_h:      { type: integer, nullable: true }
        bitrate:           { type: integer, format: int64, nullable: true }
        hdr_type:          { type: string, nullable: true }
        duration_ms:       { type: integer, format: int64, nullable: true }
        faststart:         { type: boolean }
        bit_depth:             { type: integer, nullable: true, description: 'Audio bit depth (e.g. 16, 24). Music files only.' }
        sample_rate:           { type: integer, nullable: true, description: 'Audio sample rate in Hz (e.g. 44100, 96000). Music files only.' }
        channel_layout:        { type: string, nullable: true, description: 'Channel layout label (mono, stereo, 5.1, …). Music files only.' }
        lossless:              { type: boolean, nullable: true, description: 'True for FLAC/ALAC/WAV/etc. Music files only.' }
        replaygain_track_gain: { type: number, format: double, nullable: true, description: 'ReplayGain track gain in dB. Music files only.' }
        replaygain_track_peak: { type: number, format: double, nullable: true, description: 'ReplayGain track peak (linear; can exceed 1.0). Music files only.' }
        replaygain_album_gain: { type: number, format: double, nullable: true, description: 'ReplayGain album gain in dB. Music files only.' }
        replaygain_album_peak: { type: number, format: double, nullable: true, description: 'ReplayGain album peak (linear; can exceed 1.0). Music files only.' }
        audio_streams:     { type: array, items: { $ref: '#/components/schemas/AudioStream' } }
        subtitle_streams:  { type: array, items: { $ref: '#/components/schemas/SubtitleStream' } }
        external_subtitles: { type: array, items: { $ref: '#/components/schemas/ExternalSubtitle' } }
        chapters:          { type: array, items: { $ref: '#/components/schemas/Chapter' } }
    ItemDetail:
      type: object
      properties:
        id:             { type: string, format: uuid }
        library_id:     { type: string, format: uuid }
        title:          { type: string }
        type:           { type: string }
        year:           { type: integer, nullable: true }
        summary:        { type: string, nullable: true }
        rating:         { type: number, format: float, nullable: true }
        duration_ms:    { type: integer, format: int64, nullable: true }
        poster_path:    { type: string, nullable: true }
        fanart_path:    { type: string, nullable: true }
        content_rating: { type: string, nullable: true }
