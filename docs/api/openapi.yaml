        role:       { type: string, enum: [actor, director, writer] }
        character:  { type: string, nullable: true }
        photo_path: { type: string, nullable: true }
    Person:
      type: object
      properties:
        id:         { type: string, format: uuid }
        name:       { type: string }
        biography:  { type: string, nullable: true }
        birth_date: { type: string, format: date, nullable: true }
        photo_path: { type: string, nullable: true }
    FilmographyEntry:
      type: object
      properties:
        item_id:     { type: string, format: uuid }
        title:       { type: string }
        year:        { type: integer, nullable: true }
        role:        { type: string }
        character:   { type: string, nullable: true }
        poster_path: { type: string, nullable: true }

    # ── Subtitles / Trickplay ──────────────────────────────────────────────
    SubtitleSearchResult:
      type: object
      properties:
        provider:         { type: string }
        provider_file_id: { type: string }
        language:         { type: string }
        release:          { type: string }
        downloads:        { type: integer }
        rating:           { type: number, format: float }
    TrickplayStatus:
      type: object
      properties:
        status:        { type: string, enum: [absent, pending, ready, failed] }
        sprite_count:  { type: integer }
        interval_ms:   { type: integer }
        index_url:     { type: string, nullable: true }

    # ── Transcode ──────────────────────────────────────────────────────────
    TranscodeStartRequest:
      type: object
      description: |
        Body may be an empty object `{}` for "use defaults" — the
        server picks file_id (item's primary file), height (source
        height), and codec preferences from the source. Fields below
        are all optional.
      properties:
        file_id:
          type: string
          format: uuid
          description: 'Optional — defaults to the item''s primary file (highest-quality version per ADR-031).'
        height:
          type: integer
          description: 'Output height cap. 0 = no constraint (use source height).'
        position_ms:
          type: integer
          format: int64
          description: 'Resume position in milliseconds. The audio-picker re-issue path uses this so the new session lands at the same point.'
        video_copy:
          type: boolean
          description: |
            v2.1. Force the remux path (video stream copied unchanged,
            audio re-encoded if needed). Required for AV1 source remux —
            without it the server picks H.264 NVENC/QSV/AMF re-encode
            for browser compat, even on AV1-capable clients. The AV1
            fMP4 e2e test sets this true to validate the `#EXT-X-MAP`
            + `.m4s` segment shape.
        audio_stream_index:
          type: integer
          description: 'Source audio stream index. nil/omitted = default (first) audio stream. Re-issuing the session with a different index drives the in-player audio picker.'
        supports_hevc:
          type: boolean
          description: 'Client can decode HEVC (H.265). Server uses this to pick HEVC output when transcoding (saves bandwidth) and to enable the HEVC-source remux path.'
        supports_av1:
          type: boolean
          description: |
            v2.1. Client can decode AV1. When the source is AV1 and
            this is true, the server picks the AV1 fMP4 remux path
            (av01 tag, .m4s segments, #EXT-X-MAP) over an H.264
            re-encode. Equivalent to setting `video_copy:true` for
            the AV1-source case but works generically: the server
            decides remux vs. re-encode from the source codec + this
            flag.
    TranscodeStartResponse:
      type: object
      description: |
        DASH was removed 2026-04-30; this response **does not** contain
        a `manifest_url` field. The contract is HLS-only: callers use
        `playlist_url` + `token` to fetch the M3U8 and segments. Locked
        behind an e2e regression test that asserts `playlist_url` is
        present AND `manifest_url` is absent.
      properties:
        session_id:   { type: string, format: uuid }
        playlist_url:
          type: string
          description: |
            Already includes `?token=…` — clients pass the URL through
            unchanged to fetch the M3U8. Relative path; clients
            prepend the server base URL.
        token:
          type: string
          description: 'Per-session token for segment fetches. Different from the per-file ItemFile.stream_token; this one is bound to the session id, not a file id.'
        start_offset_sec:
          type: number
          format: double
          description: |
            v2.1. Content position the stream actually opens at —
            keyframe-aligned. May be earlier than the requested
            `position_ms` when video is being stream-copied (input-
            side `-ss` snaps back to the previous keyframe). Use this
            for scrubber-time mapping so the seek bar matches what's
            on screen instead of advertising an exact resume the
            codec can't honour.
        seg0_audio_gap_sec:
          type: number
          format: double
          description: |
            v2.1. Skip this many seconds of segment 0 on startup.
            With AC3 → AAC re-encode after a mid-stream `-ss`, the
            AAC encoder's first valid frame lands a few seconds
            after video's first packet — starting playback here
            gets A/V synced from the first audible frame instead of
            showing silent video while the audio pipeline warms up.
            0 when no gap was measurable.

    # ── Notifications / Sessions ───────────────────────────────────────────
    Notification:
      type: object
      properties:
        id:         { type: string, format: uuid }
        type:       { type: string }
        title:      { type: string }
        body:       { type: string }
        item_id:    { type: string, format: uuid, nullable: true }
        read:       { type: boolean }
        created_at: { type: integer, format: int64, description: 'Unix milliseconds.' }
    Session:
      type: object
      properties:
        id:           { type: string }
        user_id:      { type: string, format: uuid }
        username:     { type: string }
        client_name:  { type: string }
        item_id:      { type: string, format: uuid }
        title:        { type: string }
        position_ms:  { type: integer, format: int64 }
        duration_ms:  { type: integer, format: int64 }
        decision:     { type: string, enum: [direct, transcode] }
        started_at:   { type: string, format: date-time }

    # ── Users / preferences / profiles ─────────────────────────────────────
    Preferences:
      type: object
      additionalProperties: true
      description: Free-form per-user preferences (subtitle defaults, theme, etc.).
    ManagedProfile:
      type: object
      properties:
        id:         { type: string, format: uuid }
        owner_id:   { type: string, format: uuid }
        name:       { type: string }
        max_content_rating:
          type: string
          nullable: true
          description: Parental ceiling — null/empty means unrestricted.
        inherit_library_access:
          type: boolean
          description: |
            v2.1 Track G item 3. When true (default), the profile sees
            its parent owner's library grants. When false, the profile
            uses its own `library_access` rows so admins can narrow
            per-profile (kid sees Family Movies only even though parent
            has 4K Movies too).
        created_at: { type: string, format: date-time }

    # ── Collections / Playlists ────────────────────────────────────────────
    Collection:
      type: object
      properties:
        id:         { type: string, format: uuid }
        name:       { type: string }
        summary:    { type: string, nullable: true }
        type:
          type: string
          enum: [playlist, smart_playlist, auto_genre]
          description: v2.1 — `smart_playlist` resolves items at query time from `rules`.
        rules:
          type: object
          nullable: true
          description: |
            v2.1 Track F item 1. JSON rule schema for smart playlists
            ("all 4K HDR movies from 2020+", "songs not played in
            6 months"). Evaluated at query time so newly-imported
            items matching the rules appear without a rebuild. Null
            for static playlists / collections.
          additionalProperties: true
        item_count: { type: integer, format: int64 }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    CollectionItem:
      type: object
      properties:
        id:         { type: string, format: uuid }
        title:      { type: string }
        type:       { type: string }
        year:       { type: integer, nullable: true }
        poster_path: { type: string, nullable: true }
    Playlist:
      type: object
      properties:
        id:         { type: string, format: uuid }
        owner_id:   { type: string, format: uuid }
        name:       { type: string }
        summary:    { type: string, nullable: true }
        item_count: { type: integer, format: int64 }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    PlaylistItem:
      type: object
      properties:
        id:          { type: string, format: uuid }
        item_id:     { type: string, format: uuid }
        position:    { type: integer }
        title:       { type: string }
        type:        { type: string }
        poster_path: { type: string, nullable: true }

    # ── Webhooks / Plugins / Tasks / Audit / Invites ───────────────────────
    Webhook:
      type: object
      properties:
        id:           { type: string, format: uuid }
        name:         { type: string }
        url:          { type: string, format: uri }
        events:       { type: array, items: { type: string } }
        enabled:      { type: boolean }
        secret_set:   { type: boolean }
        created_at:   { type: string, format: date-time }
    WebhookCreate:
      type: object
      required: [name, url, events]
      properties:
        name:    { type: string }
        url:     { type: string, format: uri }
        events:  { type: array, items: { type: string } }
        secret:  { type: string }
        enabled: { type: boolean }
    Plugin:
      type: object
      properties:
        id:          { type: string, format: uuid }
        name:        { type: string }
        endpoint:    { type: string, format: uri }
        enabled:     { type: boolean }
        capabilities: { type: array, items: { type: string } }
        last_seen:   { type: string, format: date-time, nullable: true }
    PluginCreate:
      type: object
      required: [name, endpoint]
      properties:
        name:     { type: string }
        endpoint: { type: string, format: uri }
        api_key:  { type: string }
        enabled:  { type: boolean }
    ScheduledTask:
      type: object
      properties:
        id:           { type: string, format: uuid }
        name:         { type: string }
        task_type:    { type: string }
        config:       { type: object, additionalProperties: true }
        cron_expr:    { type: string }
        enabled:      { type: boolean }
        last_run_at:  { type: string, format: date-time, nullable: true }
        next_run_at:  { type: string, format: date-time }
        last_status:  { type: string }
        last_error:   { type: string }
        created_at:   { type: string, format: date-time }
        updated_at:   { type: string, format: date-time }
    ScheduledTaskCreate:
      type: object
      required: [name, task_type, cron_expr]
      properties:
        name:      { type: string }
        task_type: { type: string }
        config:    { type: object, additionalProperties: true }
        cron_expr: { type: string }
        enabled:   { type: boolean }
    ScheduledTaskUpdate:
      type: object
      properties:
        name:      { type: string }
        task_type: { type: string }
        config:    { type: object, additionalProperties: true }
        cron_expr: { type: string }
        enabled:   { type: boolean }
    TaskRun:
      type: object
      properties:
        id:         { type: string, format: uuid }
        task_id:    { type: string, format: uuid }
        started_at: { type: string, format: date-time }
        ended_at:   { type: string, format: date-time, nullable: true }
        status:     { type: string, enum: [running, success, failure, skipped] }
        output:     { type: string }
        error:      { type: string }
    AuditEntry:
      type: object
      properties:
        id:         { type: string, format: uuid }
        user_id:    { type: string, format: uuid, nullable: true }
        action:
          type: string
          description: |
            Stable action code. Known values:
              - `auth.login_success`, `auth.login_failed`
              - `user.create`, `user.delete`, `user.role_change`, `user.password_reset`
              - `invite.create`
              - `library.create`, `library.delete`, `library.scan`
              - `settings.update`
              - `item.enrich`, `item.match_apply`, `item.delete`
              - `transcode.start`, `transcode.stop`
              - `backup.download`, `backup.restore`
              - `arr_service.create` / `.update` / `.delete` / `.set_default`
              - `request.approve`, `request.decline`, `request.delete`
              - `webhook.create`, `webhook.update`, `webhook.delete`
              - `admin.impersonate`
            Unknown values are passed through verbatim — never reject on
            this field. New actions arrive without a schema bump.
        target:     { type: string, nullable: true, description: 'Resource id or name; shape varies per action.' }
        detail:
          type: object
          additionalProperties: true
          description: 'Action-specific JSON detail. Webhook CRUD entries carry only the URL host (not the full URL) plus events + has_secret/secret_changed flags so path tokens never end up in the audit trail.'
        ip_addr:    { type: string, nullable: true }
        created_at: { type: string, format: date-time }
    Invite:
      type: object
      properties:
        id:         { type: string, format: uuid }
        email:      { type: string, format: email, nullable: true }
        token:      { type: string, description: 'Only present on create.' }
        expires_at: { type: string, format: date-time }
        used_at:    { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }

    ListMeta:
      type: object
      properties:
        total:  { type: integer, format: int64, description: '`-1` when total is unknown (load-more pagination).' }
        cursor: { type: string }

    ArrService:
      type: object
      description: |
        A single Radarr/Sonarr instance. Multi-instance is supported per kind —
        is_default flags the one OnScreen will use when no per-request override
        is supplied.
      properties:
        id:                          { type: string, format: uuid }
        name:                        { type: string }
        kind:                        { type: string, enum: [radarr, sonarr] }
        base_url:                    { type: string }
        api_key_set:                 { type: boolean, description: api_key value is never returned; this flag indicates whether one is stored. }
        default_quality_profile_id:  { type: integer, nullable: true }
        default_root_folder:         { type: string,  nullable: true }
        default_tags:                { type: array, items: { type: integer } }
        minimum_availability:        { type: string, nullable: true, description: 'Radarr only: announced | inCinemas | released' }
        series_type:                 { type: string, nullable: true, description: 'Sonarr only: standard | daily | anime' }
        season_folder:               { type: boolean, nullable: true, description: Sonarr only. }
        language_profile_id:         { type: integer, nullable: true, description: Sonarr only (legacy v3). }
        is_default:                  { type: boolean }
        enabled:                     { type: boolean }
        created_at:                  { type: string, format: date-time }
        updated_at:                  { type: string, format: date-time }

    ArrServiceCreate:
      type: object
      required: [name, kind, base_url, api_key]
      properties:
        name:                        { type: string }
        kind:                        { type: string, enum: [radarr, sonarr] }
        base_url:                    { type: string }
        api_key:                     { type: string }
        default_quality_profile_id:  { type: integer, nullable: true }
        default_root_folder:         { type: string,  nullable: true }
        default_tags:                { type: array, items: { type: integer } }
        minimum_availability:        { type: string, nullable: true }
        series_type:                 { type: string, nullable: true }
        season_folder:               { type: boolean, nullable: true }
        language_profile_id:         { type: integer, nullable: true }
        is_default:                  { type: boolean, default: false }
        enabled:                     { type: boolean, default: true }

    ArrServiceUpdate:
      type: object
      description: |
        Every field is optional. Send `api_key` only when rotating the credential —
        an omitted or empty `api_key` keeps the existing value. is_default is not
        settable here; use POST /api/v1/admin/arr-services/{id}/set-default.
      properties:
        name:                        { type: string }
        base_url:                    { type: string }
        api_key:                     { type: string }
        default_quality_profile_id:  { type: integer, nullable: true }
        default_root_folder:         { type: string,  nullable: true }
        default_tags:                { type: array, items: { type: integer } }
        minimum_availability:        { type: string, nullable: true }
        series_type:                 { type: string, nullable: true }
        season_folder:               { type: boolean, nullable: true }
        language_profile_id:         { type: integer, nullable: true }
        enabled:                     { type: boolean }

    ArrProbeResult:
      type: object
      properties:
        status:    { type: string, example: ok }
        version:   { type: string }
        app_name:  { type: string }
        quality_profiles:
          type: array
          items:
            type: object
            properties: { id: { type: integer }, name: { type: string } }
        root_folders:
          type: array
          items:
            type: object
            properties:
              id:         { type: integer }
              path:       { type: string }
              free_space: { type: integer, format: int64 }
        tags:
          type: array
          items:
            type: object
            properties: { id: { type: integer }, label: { type: string } }
        language_profiles:
          type: array
          items:
            type: object
            properties: { id: { type: integer }, name: { type: string } }

    DiscoverItem:
      type: object
      properties:
        type:                  { type: string, enum: [movie, show] }
        tmdb_id:               { type: integer }
        title:                 { type: string }
        year:                  { type: integer }
        overview:              { type: string }
        rating:                { type: number, format: float }
        poster_url:            { type: string }
