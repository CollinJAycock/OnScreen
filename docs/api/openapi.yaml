        files:          { type: array, items: { $ref: '#/components/schemas/ItemFile' } }
        markers:        { type: array, items: { $ref: '#/components/schemas/Marker' } }
        musicbrainz_id:               { type: string, format: uuid, nullable: true, description: 'Primary MBID for the row''s type (recording for tracks, release-group for albums, artist for artists).' }
        musicbrainz_release_id:       { type: string, format: uuid, nullable: true }
        musicbrainz_release_group_id: { type: string, format: uuid, nullable: true }
        musicbrainz_artist_id:        { type: string, format: uuid, nullable: true }
        musicbrainz_album_artist_id:  { type: string, format: uuid, nullable: true }
