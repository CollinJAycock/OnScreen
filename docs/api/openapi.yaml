  /api/v1/profiles/{id}/library-inherit:
    parameters: [{ $ref: '#/components/parameters/UUID' }]
    put:
      summary: Toggle a managed profile's library inheritance flag (v2.1)
      description: |
        Sets `inherit_library_access` on the profile. When true, the
        profile sees the parent owner's library grants. When false, it
        uses its own `library_access` rows — admins then call
        `PUT /api/v1/users/{id}/libraries` to set the explicit set.

        Auth: parent owner OR admin. The SQL gates by `parent_user_id`
        when the caller isn't admin and returns 0 rows on a mismatch,
        which the handler maps to 404 to avoid leaking profile IDs.
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [inherit]
              properties:
                inherit: { type: boolean }
      responses:
        '204': { description: Flag updated. }
        '404': { description: Profile not owned by caller (or not a managed profile). }

