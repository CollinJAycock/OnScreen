      responses:
        '200':
          description: Sprite/VTT.
          content:
            image/jpeg: {}
            text/vtt:   {}

  # ── Transcode ──────────────────────────────────────────────────────────────
  /api/v1/items/{id}/transcode:
    parameters: [{ $ref: '#/components/parameters/UUID' }]
    post:
      summary: Start a HLS transcode session
      tags: [Transcode]
      description: |
        Spins up an HLS session for the item. The server picks one of
        three decisions: **direct** (no session, client plays the
        file directly), **remux** (video stream copied, audio
        re-encoded if needed — this is the path AV1 sources take
        with `video_copy:true`), or **transcode** (full re-encode).
        The response shape is the same regardless, but `direct` is
        rare from this endpoint — typically the client checks the
        item's file metadata first and skips the session start
        entirely.

        Body may be an empty object `{}` for "use defaults". For an
        AV1 source on an AV1-capable client, send `{"video_copy": true}`
        to get the fMP4 remux path with `#EXT-X-MAP` + `.m4s`
        segments instead of H.264 NVENC/QSV/AMF re-encode.

        Subject to the per-session `TranscodeStartLimit` rate limit
        (default 10/min, override via `OS_TRANSCODE_START_RATE_LIMIT_PER_MIN`).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TranscodeStartRequest'
      responses:
        '200':
          description: Session created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/TranscodeStartResponse' }
        '404':
          description: 'Item not found, or item type is not transcodable (e.g. audiobook / book / photo).'
        '429':
          description: 'TranscodeStartLimit exceeded for this session.'

  /api/v1/transcode/sessions/{sid}:
    parameters: [{ in: path, name: sid, required: true, schema: { type: string } }]
    delete:
      summary: Stop a HLS transcode session
      tags: [Transcode]
      responses:
        '204': { description: Stopped. }

  /api/v1/transcode/sessions/{sid}/playlist.m3u8:
    parameters:
      - { in: path, name: sid, required: true, schema: { type: string } }
      - { in: query, name: token, required: true, schema: { type: string }, description: 'Segment token from `transcodeStart`.' }
    get:
      summary: Serve the rewritten HLS playlist
      description: Returns `application/x-mpegURL`. Errors are plain text, not the JSON envelope.
      tags: [Transcode]
      security: []
      responses:
        '200':
          description: Playlist.
          content:
            application/x-mpegURL: {}
        '401': { description: Bad or missing token. }
        '503': { description: Playlist not yet ready or request cancelled. }

  /api/v1/transcode/sessions/{sid}/seg/{name}:
    parameters:
      - { in: path, name: sid,  required: true, schema: { type: string } }
      - { in: path, name: name, required: true, schema: { type: string } }
      - { in: query, name: token, required: true, schema: { type: string } }
    get:
      summary: Serve a HLS segment
      description: Returns `video/MP2T` or `video/mp4`. Errors are plain text.
      tags: [Transcode]
      security: []
      responses:
        '200':
          description: Segment.
          content:
            video/MP2T: {}
            video/mp4:  {}
        '401': { description: Bad or missing token. }
        '404': { description: Segment not found upstream. }

  # ── Direct play / subtitles ────────────────────────────────────────────────
  /media/stream/{id}:
    parameters:
      - { $ref: '#/components/parameters/UUID' }
      - in: query
        name: token
        required: false
        schema: { type: string }
        description: |
          Optional Paseto v4 stream token (purpose=stream) bound to this
          file ID. Used by native players that can't carry a Bearer
          header on a media-element fetch (Android `<video>`, iOS Safari
          `<audio>`). Token is 24 h, file_id-pinned, and rejected on
          any non-file-scoped route. Falls through to the standard
          Bearer / cookie auth when omitted.
    get:
      summary: Direct-play a media file
      description: Serves the raw container with HTTP range support. Auth via cookie, bearer, or `?token=<stream_token>`.
      tags: [Items]
      responses:
        '200':
          description: Full body.
          content:
            'video/*': {}
        '206':
          description: Partial content (range request).
        '401': { description: 'Bad or missing auth.' }
        '403': { description: "Caller's content-rating ceiling forbids this item, or per-library ACL denies access." }
        '404': { description: 'File not found, soft-deleted, or item lookup failed.' }

  /media/download/{id}:
    parameters:
      - { $ref: '#/components/parameters/UUID' }
      - in: query
        name: token
        required: false
        schema: { type: string }
        description: |
          Same stream-token semantics as `/media/stream/{id}` — required
          when the caller can't carry cookies (mobile webview download
          managers, share-sheet handoff to a downloader app).
    get:
      summary: Download the raw file with a save-as disposition
      description: |
        Same auth + per-library ACL + content-rating gate as `/media/stream/{id}`,
        but adds `Content-Disposition: attachment; filename="..."; filename*=UTF-8''...`
        and `Content-Type: application/octet-stream` so the browser triggers a
        save-as dialog instead of inline playback. Body bytes are the original
        on-disk file (no transcode); `Range` is honoured so an interrupted
        download can resume.

        Filename is built from the item title + the on-disk extension and
        sanitised against header injection (CRLF strip), shell-illegal
        characters, and quoted-string termination (`"`, `\`). Capped at 200
        chars. Both the ASCII `filename=` fallback and the UTF-8
        `filename*=UTF-8''<percent-encoded>` form are emitted so non-ASCII
        titles survive on every browser.

        Direct-play files only — transcoded-for-download (re-encode to a
        smaller / device-specific format) is a future feature.
      tags: [Items]
      responses:
        '200':
          description: Full body with attachment disposition.
          headers:
            Content-Disposition:
              schema: { type: string }
              description: 'Always begins with `attachment;` and includes both `filename=` and `filename*=UTF-8''` forms.'
          content:
            application/octet-stream: {}
        '206':
          description: Partial content (resume after interrupted download).
        '401': { description: Bad or missing auth. }
        '403': { description: Content-rating or per-library ACL denial. }
        '404': { description: File not found or soft-deleted. }

  /media/subtitles/{fileId}/{streamIndex}:
    parameters:
      - { in: path, name: fileId,      required: true, schema: { type: string, format: uuid } }
      - { in: path, name: streamIndex, required: true, schema: { type: integer } }
    get:
      summary: Serve an embedded subtitle as VTT
