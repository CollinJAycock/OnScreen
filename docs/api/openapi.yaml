  # ── Admin observability ───────────────────────────────────────────────────
  /api/v1/admin/logs:
    get:
      summary: Read recent server log entries (admin)
      tags: [Admin]
      description: |
        v2.1 (Track J). Returns recent slog records from the
        process-local 2000-entry ring buffer attached to the slog
        handler chain at boot. No file tail, no shell. Useful when
        the server runs in a container the operator can't easily
        exec into (TrueNAS Apps, Cloud Run). Newest-last ordering.
      parameters:
        - in: query
          name: level
          schema: { type: string, enum: [debug, info, warn, warning, error] }
          description: Minimum slog level to include (default info).
        - in: query
          name: limit
          schema: { type: integer, default: 200, minimum: 1, maximum: 2000 }
          description: Max entries to return (default 200, hard cap 2000).
      responses:
        '200':
          description: Log entries.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        time:  { type: string, format: date-time }
                        level: { type: string, enum: [DEBUG, INFO, WARN, ERROR] }
                        msg:   { type: string }
                        attrs: { type: object, additionalProperties: true, description: 'Structured attrs (request_id, library_id, err, etc). Errors are stringified for diagnostic readability.' }
        '503':
          description: Log buffer not configured on this build.

