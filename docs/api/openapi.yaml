openapi: 3.0.3
info:
  title: OnScreen API
  version: "2.1.1-dev"
  description: |
    HTTP API for the OnScreen media server.

    All JSON responses use a uniform envelope:
      - Success: `{ "data": <payload> }`
      - List:    `{ "data": [...], "meta": { "total": <int>, "cursor": "<string>" } }`
      - Error:   `{ "error": { "code": "<UPPER_SNAKE>", "message": "...", "request_id": "..." } }`

    The HLS playlist and segment endpoints under `/api/v1/transcode/sessions/{sid}/`
    are an intentional exception: HLS players cannot consume JSON errors, so those
    paths return raw `text/plain` errors with appropriate HTTP status codes.

    Auth is delivered as either a Paseto v4 bearer token (`Authorization: Bearer ...`)
    or the `os_access` httpOnly cookie set by `/auth/login`. Browser clients use the
    cookie; native and third-party clients use the bearer header.
  license:
    name: AGPL-3.0
servers:
  - url: http://localhost:7070
    description: Local development server (default OnScreen API port)
  - url: https://onscreen.example.com
    description: Production deployment (replace with your origin)

security:
  - bearerAuth: []
  - cookieAuth: []

tags:
  - name: Auth
    description: Login, registration, password recovery, OIDC and LDAP SSO.
  - name: Pairing
    description: Native client device pairing via short-lived PIN.
  - name: System
    description: Capabilities discovery and setup status.
  - name: Libraries
    description: Library CRUD plus item browsing inside a library.
  - name: Items
    description: Per-item metadata, playback progress, markers, EXIF, enrichment.
  - name: Search
    description: Full-text search across media items.
  - name: Hub
    description: Home-page rails (continue watching, recently added).
  - name: History
    description: Per-user watch history.
  - name: Favorites
    description: Per-user favorited items.
  - name: Collections
    description: Curated, server-wide collections.
  - name: Playlists
    description: User-owned ordered playlists.
  - name: People
    description: Cast and crew.
  - name: Subtitles
    description: External subtitle search, download, and OCR.
  - name: Trickplay
    description: Seekbar thumbnail previews.
  - name: Transcode
    description: HLS transcode sessions (start, stop, segments).
  - name: Notifications
    description: User notifications (list, mark read, SSE stream).
  - name: Sessions
    description: Active playback sessions.
  - name: Users
    description: User profile, PIN management, managed profiles, admin user management.
  - name: Settings
    description: Server-wide settings (admin only).
  - name: Webhooks
    description: |
      Outbound webhooks (admin only).

      **Signing (when a `secret` was configured on the endpoint):** every
      delivery carries two headers — `X-OnScreen-Timestamp: <unix-seconds>`
      and `X-OnScreen-Signature: sha256=<hex(HMAC(secret, "{ts}.{body}"))>`.
      Stripe-shaped: the timestamp is part of the signed input, so an
      attacker can't change `X-OnScreen-Timestamp` without invalidating
      the MAC. Receivers MUST (1) reject timestamps outside a small drift
      window (±5 minutes is typical) to defeat replay of a captured
      request, and (2) recompute the HMAC over `{header_ts}.{request_body}`
      and compare with constant-time equality.

      **SSRF protection:** the outbound HTTP client refuses connections
      to private, loopback, link-local, multicast, and unspecified IP
      addresses post-resolution, and `CheckRedirect` returns
      `ErrUseLastResponse` so a 3xx to a different host can't be used to
      leak the signed POST body.

      **Audit:** create / update / delete on a webhook endpoint emit
      `webhook.create` / `webhook.update` / `webhook.delete` rows in the
      audit log. The detail field carries the URL host (not the full
      URL — keeps path tokens out of the audit trail), the events list,
      and a `has_secret` / `secret_changed` flag.
  - name: Maintenance
    description: One-shot admin operations (artwork backfill, dedupe).
  - name: Plugins
    description: Outbound MCP plugin registrations (admin only).
  - name: Backup
    description: Backup download and restore (admin only).
  - name: Tasks
    description: Scheduled task CRUD plus run history (admin only).
  - name: Audit
    description: Audit log (admin only).
  - name: Analytics
    description: Usage analytics (admin only).
  - name: Invites
    description: Invitation creation and acceptance.
  - name: Email
    description: SMTP test (admin only).
  - name: Arr
    description: Sonarr/Radarr webhook ingestion.
  - name: ArrServices
    description: Multi-instance Radarr/Sonarr configuration (admin only).
  - name: Discover
    description: TMDB-backed search for the request workflow.
  - name: Requests
    description: Media request workflow (user submit, admin approve/decline).

paths:
  # ── Health ─────────────────────────────────────────────────────────────────
  /health/live:
    get:
      summary: Liveness probe
      description: Returns 200 with `{"status":"ok"}` if the process is up.
      tags: [System]
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, enum: [ok] }

  # ── System ─────────────────────────────────────────────────────────────────
  /api/v1/setup/status:
    get:
      summary: Initial setup status
      tags: [System]
      security: []
      responses:
        '200':
          description: Whether first-run setup has been completed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetupStatusEnvelope'

  /api/v1/system/capabilities:
    get:
      summary: Server capabilities
      description: Server build, enabled features, and operational limits.
      tags: [System]
      security: []
      responses:
        '200':
          description: Capabilities snapshot.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CapabilitiesEnvelope'

  /api/v1/email/enabled:
    get:
      summary: Email-feature visibility flag
      tags: [System]
      security: []
      responses:
        '200': { $ref: '#/components/responses/BoolEnabled' }

  /api/v1/auth/forgot-password/enabled:
    get:
      summary: Password-reset feature visibility flag
      tags: [System]
      security: []
      responses:
        '200': { $ref: '#/components/responses/BoolEnabled' }

  /api/v1/auth/oidc/enabled:
    get:
      summary: OIDC SSO visibility flag
      tags: [System]
      security: []
      responses:
        '200': { $ref: '#/components/responses/BoolEnabled' }

  /api/v1/auth/ldap/enabled:
    get:
      summary: LDAP login visibility flag
      tags: [System]
      security: []
      responses:
        '200': { $ref: '#/components/responses/BoolEnabled' }

  # ── Auth ───────────────────────────────────────────────────────────────────
  /api/v1/auth/login:
    post:
      summary: Local username/password login
      description: |
        Two layered rate limits:
          - **Per-IP** (chi `httprate`): cap on calls from one source IP
            inside a sliding window — defeats single-host brute force.
          - **Per-username** (Valkey, failure-only counter): caps total
            *failed* logins across all source IPs against one username
            inside the same window — defeats credential stuffing from
            CGNAT pools or botnets where per-IP wouldn't bite. The cap
            counts failures only, so a power-user who logs in 10× in a
            day legitimately won't lock themselves out. Counter clears
            on a successful login. The Valkey key is keyed on a
            HMAC-SHA256 of the lowercased attempted username with
            `SECRET_KEY` as pepper, so the keyspace can't be scanned for
            real usernames.

        Both bcrypt-compare (real password) and a dummy bcrypt-compare
        (user-not-found, federated-only user) run at cost 12 so login
        latency doesn't reveal which case applied.
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username: { type: string }
                password: { type: string, format: password }
      responses:
        '200':
          description: Token pair plus user metadata. Sets `os_access` and `os_refresh` cookies.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPairEnvelope'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401':
          description: |
            Bad credentials, or the per-username failure cap was reached.
            Both paths return the same generic envelope so the response
            doesn't reveal which one fired.

  /api/v1/auth/refresh:
    post:
      summary: Refresh access token
      description: Reads refresh token from JSON body (`refresh_token`) or `os_refresh` cookie.
      tags: [Auth]
      security: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token: { type: string }
      responses:
        '200':
          description: New token pair.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPairEnvelope'
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/v1/auth/logout:
    post:
      summary: Revoke the current refresh token
      tags: [Auth]
      security: []
      responses:
        '204':
          description: Logged out. Clears `os_access` and `os_refresh` cookies.

  /api/v1/auth/register:
    post:
      summary: Register a new user
      description: |
        First call (no users yet) creates the initial admin and is unauthenticated.
        Subsequent calls require an admin caller; the new account is non-admin.
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username: { type: string, pattern: '^[a-zA-Z0-9_]{2,32}$' }
                email:    { type: string, format: email }
                password: { type: string, format: password, minLength: 8 }
      responses:
        '201':
          description: Created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/UserInfo' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '409': { $ref: '#/components/responses/Conflict' }

  /api/v1/auth/forgot-password:
    post:
      summary: Request a password reset email
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
      responses:
        '200':
          description: |
            Always 200 with a generic message envelope. The response is
            identical whether the address exists, doesn't exist, or SMTP
            is disabled — closing the enumeration / SMTP-state differential
            an attacker would otherwise probe with timing or status-code
            comparison.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      message: { type: string, example: 'If an account with that email exists, a password reset link has been sent.' }

  /api/v1/auth/reset-password:
    post:
      summary: Complete a password reset
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, password]
              properties:
                token:    { type: string }
                password: { type: string, format: password, minLength: 12 }
      responses:
        '200':
          description: Password reset. New password is enforced at 12-char minimum and the token is single-use (claimed atomically before the password write — a second concurrent submit of the same token loses the race and gets 400 Invalid).
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      message: { type: string, example: 'Password has been reset. You can now sign in.' }
        '400':
          description: |
            Token invalid, expired, already used, or password fails the
            12-char floor. Body shape matches the standard error envelope
            (see `#/components/responses/BadRequest`).

  /api/v1/auth/oidc:
    get:
      summary: Begin OIDC SSO flow
      description: 302 redirect to the configured IdP authorization endpoint.
      tags: [Auth]
      security: []
      responses:
        '302': { description: Redirect to IdP. }

  /api/v1/auth/oidc/callback:
    get:
      summary: OIDC callback
      description: Exchanges the authorization code, issues tokens, and 302s to the SPA.
      tags: [Auth]
      security: []
      parameters:
        - { in: query, name: code,  required: true, schema: { type: string } }
        - { in: query, name: state, required: true, schema: { type: string } }
      responses:
        '302': { description: Redirect after successful login. }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/v1/auth/ldap/login:
    post:
      summary: LDAP bind login
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username: { type: string }
                password: { type: string, format: password }
      responses:
        '200':
          description: Token pair (LDAP-backed account).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPairEnvelope'
        '401': { $ref: '#/components/responses/Unauthorized' }

  /api/v1/auth/pin-switch:
    post:
      summary: Switch to another local user via PIN
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id, pin]
              properties:
                user_id: { type: string, format: uuid }
                pin:     { type: string, minLength: 4, maxLength: 8 }
      responses:
        '200':
          description: Token pair for the target user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPairEnvelope'

  # ── Pairing ────────────────────────────────────────────────────────────────
  /api/v1/auth/pair/code:
    post:
      summary: Create a pairing PIN
      description: |
        Issued to a native client. Returns a 6-digit PIN to display to the user
        plus a `device_token` the client uses to poll. PIN expires in 10 minutes.
      tags: [Pairing]
      security: []
      responses:
        '200':
          description: New pairing record.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/PairCodeResponse'

  /api/v1/auth/pair/poll:
    get:
      summary: Poll for pairing completion
      tags: [Pairing]
      security: []
      parameters:
        - { in: query, name: device_token, required: true, schema: { type: string } }
      responses:
        '200':
          description: Pending or claimed status; on `claimed` includes a token pair.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/PairPollResponse'
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v1/auth/pair/claim:
    post:
      summary: Claim a pairing PIN (browser-side)
      description: Binds a displayed PIN to the authenticated user, releasing tokens to the waiting device.
      tags: [Pairing]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [pin]
              properties:
                pin:         { type: string, minLength: 6, maxLength: 6 }
                device_name: { type: string }
      responses:
        '204': { description: Claimed. The polling device now has tokens. }
        '404': { $ref: '#/components/responses/NotFound' }

  # ── Libraries ──────────────────────────────────────────────────────────────
  /api/v1/libraries:
    get:
      summary: List libraries the caller can access
      tags: [Libraries]
      responses:
        '200':
          description: Library list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LibraryListEnvelope'
    post:
      summary: Create a library (admin)
      tags: [Libraries]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LibraryCreate'
      responses:
        '201':
          description: Created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Library' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /api/v1/libraries/{id}:
    parameters: [{ $ref: '#/components/parameters/UUID' }]
    get:
      summary: Get a single library
      tags: [Libraries]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Library' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      summary: Update a library (admin)
      tags: [Libraries]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LibraryUpdate' }
      responses:
        '200':
          description: Updated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Library' }
    delete:
      summary: Delete a library (admin)
      tags: [Libraries]
      responses:
        '204': { description: Deleted. }

  /api/v1/libraries/{id}/items:
    parameters:
      - { $ref: '#/components/parameters/UUID' }
      - { $ref: '#/components/parameters/Limit' }
      - { $ref: '#/components/parameters/Offset' }
      - { in: query, name: q,        schema: { type: string }, description: 'Title contains substring.' }
      - { in: query, name: genre,    schema: { type: string }, description: 'Filter by genre name.' }
      - { in: query, name: year_min, schema: { type: integer } }
      - { in: query, name: year_max, schema: { type: integer } }
      - { in: query, name: rating_min, schema: { type: number, format: float } }
      - { in: query, name: sort, schema: { type: string, enum: [title, year, rating, created_at, updated_at] } }
      - { in: query, name: order, schema: { type: string, enum: [asc, desc] } }
    get:
      summary: List items in a library
      tags: [Libraries]
      responses:
        '200':
          description: Filtered list of media items.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaItemListEnvelope'

  /api/v1/libraries/{id}/genres:
    parameters: [{ $ref: '#/components/parameters/UUID' }]
    get:
      summary: List distinct genres in a library
      tags: [Libraries]
      responses:
        '200':
          description: Genre counts.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/GenreCount' }

  /api/v1/libraries/{id}/years:
    parameters: [{ $ref: '#/components/parameters/UUID' }]
    get:
      summary: List distinct years in a library
      tags: [Libraries]
      responses:
        '200':
          description: Year counts.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/YearCount' }

  /api/v1/libraries/{id}/scan:
    parameters: [{ $ref: '#/components/parameters/UUID' }]
    post:
      summary: Trigger a library scan (admin)
      tags: [Libraries]
      responses:
        '202': { description: Scan enqueued. }

  /api/v1/libraries/{id}/detect-intros:
    parameters: [{ $ref: '#/components/parameters/UUID' }]
    post:
      summary: Trigger intro detection across the library (admin)
      tags: [Libraries]
      responses:
        '202': { description: Detection enqueued. }

  # ── Search ─────────────────────────────────────────────────────────────────
  /api/v1/search:
    get:
      summary: Full-text item search
      tags: [Search]
      parameters:
        - { in: query, name: q, required: true, schema: { type: string } }
        - { in: query, name: library_id, schema: { type: string, format: uuid } }
        - { in: query, name: limit, schema: { type: integer, default: 20, maximum: 100 } }
      responses:
        '200':
          description: Search results.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/SearchResult' }
        '400': { $ref: '#/components/responses/BadRequest' }

  # ── Hub ────────────────────────────────────────────────────────────────────
  /api/v1/hub:
    get:
      summary: Home-page rails
      description: Continue watching, recently added, and on-deck rails for the current user.
      tags: [Hub]
      responses:
        '200':
          description: Hub data.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Hub' }

  # ── History ────────────────────────────────────────────────────────────────
  /api/v1/history:
    get:
      summary: Watch history
      tags: [History]
      parameters:
        - { $ref: '#/components/parameters/Limit' }
        - { $ref: '#/components/parameters/Offset' }
      responses:
        '200':
          description: History entries (newest first).
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ListEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/WatchHistoryItem' }

  # ── Favorites ──────────────────────────────────────────────────────────────
  /api/v1/favorites:
    get:
      summary: List favorited items
      tags: [Favorites]
      parameters:
        - { $ref: '#/components/parameters/Limit' }
        - { $ref: '#/components/parameters/Offset' }
      responses:
        '200':
          description: Favorites.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ListEnvelope'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/FavoriteItem' }

  /api/v1/items/{id}/favorite:
    parameters: [{ $ref: '#/components/parameters/UUID' }]
    post:
      summary: Add an item to favorites
      tags: [Favorites]
      responses:
        '204': { description: Added. }
    delete:
      summary: Remove an item from favorites
      tags: [Favorites]
      responses:
        '204': { description: Removed. }

  # ── Items ──────────────────────────────────────────────────────────────────
  /api/v1/items/{id}:
    parameters: [{ $ref: '#/components/parameters/UUID' }]
    get:
      summary: Get a single media item with files and markers
      tags: [Items]
      responses:
        '200':
          description: Item detail.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/ItemDetail' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      summary: Update item metadata (admin)
      tags: [Items]
      description: |
        Admin-curated metadata editor. Intentionally narrow: only the
        three fields below are editable, because they're the only
        ones that don't have an external metadata agent owning them
        (home_video and photo libraries have no TMDB-equivalent, so
        the user owns title / summary / taken_at outright). Any other
        field — genres, rating, fanart, **content_rating**, etc. —
        belongs to the TMDB-enriched flow and has its own Fix Match
        path. Unknown fields are rejected with HTTP 400
        (DisallowUnknownFields) so a misnamed key like
        `content_rating` returns a clear error instead of silently
        being dropped.

        For home_video items, setting `title` also renames the file
        on disk (sanitized + collision-suffixed) and stamps the
        file's mtime to `taken_at`, so user edits travel with the
        file across tools (Finder, Photos.app, Plex/Jellyfin
        scanners) instead of being locked into OnScreen's DB.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:    { type: string, description: 'Empty string is rejected with 400.' }
                summary:  { type: string, description: 'Empty string clears the summary.' }
                taken_at:
                  type: string
                  description: |
                    RFC3339 timestamp ("2024-04-15T00:00:00Z") or
                    bare YYYY-MM-DD. Empty string clears the date.
                    For home_video items, this also drives the file
                    mtime stamp so external tools sort by recording
                    date rather than scan date.
      responses:
        '200':
          description: Updated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/ItemDetail' }
        '400':
          description: 'Invalid body, empty title, or unknown field.'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /api/v1/items/{id}/children:
    parameters: [{ $ref: '#/components/parameters/UUID' }]
    get:
