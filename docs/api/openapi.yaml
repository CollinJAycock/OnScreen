    # ── Search / Hub / History / Favorites ─────────────────────────────────
    SearchResult:
      type: object
      properties:
        id:          { type: string, format: uuid }
        library_id:  { type: string, format: uuid }
        title:       { type: string }
        type:        { type: string }
        year:        { type: integer, nullable: true }
        poster_path: { type: string, nullable: true }
        thumb_path:  { type: string, nullable: true }
    Hub:
      type: object
      description: |
        Home-hub aggregation. v2.1 split Continue-Watching into three
        kinds (TV / movies / other) so clients can render the per-
        kind rows the test plan + native clients expect. The legacy
        combined `continue_watching` is retained on the response for
        older clients; new clients should prefer the per-kind arrays.
        `cooccurrence` / `because_you_watched` were built then
        removed before v2.1 ship — the response will not surface
        them; the absence is locked behind an e2e contract test.
        Every hub section honours the caller's `max_content_rating`
        ceiling (set via PUT /users/{id}/content-rating).
      properties:
        continue_watching:
          type: array
          items: { $ref: '#/components/schemas/ChildItem' }
          description: Legacy combined feed (movies + episodes interleaved). Kept for older clients.
        continue_watching_tv:
          type: array
          items: { $ref: '#/components/schemas/ChildItem' }
          description: |
            v2.1. TV-only continue-watching, deduped to one tile per
            series (the most recently watched episode).
        continue_watching_movies:
          type: array
          items: { $ref: '#/components/schemas/ChildItem' }
          description: v2.1. Movies-only continue-watching.
        continue_watching_other:
          type: array
          items: { $ref: '#/components/schemas/ChildItem' }
          description: v2.1. Audiobooks / podcasts / home video / other types.
        recently_added:
          type: array
          items: { $ref: '#/components/schemas/MediaItem' }
        recently_added_by_library:
          type: array
          items: { $ref: '#/components/schemas/HubLibraryRow' }
          description: |
            v2.1. One row per visible library, latest-N items each.
            Lets clients render a "Recently added in <Library>"
            shelf without a separate per-library API call.
        trending:
          type: array
          items: { $ref: '#/components/schemas/ChildItem' }
          description: |
            v2.1. Global "what others are watching" row over the last
            7 days. Same content for every user (no personalisation),
            filtered by the caller's library access + parental
            ceiling. 30 raw rows narrowed to 12 after access-filter.
    HubLibraryRow:
      type: object
      properties:
        library_id:   { type: string, format: uuid }
        library_name: { type: string }
        items:        { type: array, items: { $ref: '#/components/schemas/ChildItem' } }
    WatchHistoryItem:
      type: object
      properties:
        id:           { type: string, format: uuid }
        media_id:     { type: string, format: uuid }
        title:        { type: string }
        type:         { type: string }
        year:         { type: integer, nullable: true }
        thumb_path:   { type: string, nullable: true }
        client_name:  { type: string, nullable: true }
        duration_ms:  { type: integer, format: int64, nullable: true }
        occurred_at:  { type: string, format: date-time }
    FavoriteItem:
      type: object
      properties:
        id:           { type: string, format: uuid }
        library_id:   { type: string, format: uuid }
        type:         { type: string }
        title:        { type: string }
        year:         { type: integer, nullable: true }
        summary:      { type: string, nullable: true }
        poster_path:  { type: string, nullable: true }
        thumb_path:   { type: string, nullable: true }
        duration_ms:  { type: integer, format: int64, nullable: true }
        favorited_at: { type: integer, format: int64, description: 'Unix milliseconds.' }

    # ── People ─────────────────────────────────────────────────────────────
    PersonSummary:
      type: object
      properties:
        id:          { type: string, format: uuid }
        name:        { type: string }
        photo_path:  { type: string, nullable: true }
    Credit:
      type: object
      properties:
        person_id:  { type: string, format: uuid }
