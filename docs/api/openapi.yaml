  /api/v1/users/{id}/content-rating:
    parameters: [{ $ref: '#/components/parameters/UUID' }]
    put:
      summary: Set max content rating for a user (admin)
      tags: [Users]
      description: |
        The ceiling is enforced server-side on every user-facing
        aggregation surface (`/api/v1/hub` including the trending
        row, `/api/v1/search`, `/collections/{id}/items`,
        `/items/{id}/children`, `/history`). Items above the
        ceiling are filtered out at the SQL layer, not just hidden
        in the UI. Setting the ceiling on the user takes effect on
        their NEXT login — the value is baked into the access-token
        claims at issuance.

        Field name is **`max_content_rating`** (not
        `content_rating`). Unknown fields return HTTP 400
        (DisallowUnknownFields) — without that, a wrong key would
        decode into `null` and silently CLEAR the ceiling, which
        looked like a successful set from the caller's perspective.

        Rank ordering (lower is more restrictive): G/TV-Y/TV-G=0,
        PG/TV-Y7/TV-PG=1, PG-13/TV-14=2, R/NC-17/TV-MA=3, NR/empty=4.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                max_content_rating:
                  type: string
                  nullable: true
                  description: |
                    e.g. "PG-13", "TV-MA", "" or null to clear the
                    ceiling (user sees everything). Omit the field
                    entirely to leave the current value untouched.
      responses:
        '204': { description: Set. }
        '400':
          description: 'Invalid body or unknown field (e.g. "content_rating" instead of "max_content_rating").'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '403': { $ref: '#/components/responses/Forbidden' }

