# OnScreen HA reverse-proxy configuration
# Referenced by docker-compose.ha.yml (nginx service).
#
# Before deploying:
#   1. Replace /etc/ssl/certs/onscreen.crt and /etc/ssl/private/onscreen.key
#      with real certificate paths (or mount them via docker-compose volumes).
#   2. Adjust server_name to your actual domain.

worker_processes auto;
pid            /tmp/nginx.pid;

events {
    worker_connections 2048;
    multi_accept       on;
}

http {
    # ── Basics ───────────────────────────────────────────────────────────────
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time urt=$upstream_response_time';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log  warn;

    # ── Client limits ────────────────────────────────────────────────────────
    client_max_body_size 10m;

    # ── Upstream: Docker DNS resolves "onscreen" to all 3 replicas ───────────
    upstream onscreen_backend {
        least_conn;
        server onscreen:7070;

        # Keep connections alive to the backend for better throughput.
        keepalive 32;
    }

    # ── HTTP → HTTPS redirect ────────────────────────────────────────────────
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        # Health check available over plain HTTP so external probes (ELB, etc.)
        # don't need a TLS handshake.
        location = /health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS server ─────────────────────────────────────────────────────────
    server {
        listen 443 ssl http2 default_server;
        listen [::]:443 ssl http2 default_server;
        server_name _;

        # ── TLS ──────────────────────────────────────────────────────────────
        # TODO: Replace with real certificate paths or mount via compose volumes.
        ssl_certificate     /etc/ssl/certs/onscreen.crt;
        ssl_certificate_key /etc/ssl/private/onscreen.key;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers   ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:TLS:10m;
        ssl_session_timeout 10m;
        ssl_session_tickets off;

        # OCSP stapling requires the full certificate chain
        ssl_stapling        on;
        ssl_stapling_verify on;
        ssl_trusted_certificate /etc/ssl/certs/onscreen.crt;  # Must include full CA chain
        resolver 127.0.0.11 valid=30s;   # Docker embedded DNS

        # ── Security headers ─────────────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options    "nosniff"                                      always;
        add_header X-Frame-Options           "SAMEORIGIN"                                   always;
        add_header X-XSS-Protection          "1; mode=block"                                always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin"              always;
        add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()"     always;

        # ── Common proxy settings ────────────────────────────────────────────
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Streaming-friendly timeouts: keep proxy connections open long enough
        # for video playback and large file transfers.
        proxy_connect_timeout 10s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
        proxy_buffering       off;

        # ── Health check (HTTPS side) ────────────────────────────────────────
        location = /health {
            access_log off;
            return 200 "ok\n";
            # Repeat parent security headers (add_header in a location block
            # overrides ALL parent server-block add_header directives).
            add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header X-XSS-Protection "1; mode=block" always;
            add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
            add_header Content-Type text/plain;
        }

        # ── API routes ───────────────────────────────────────────────────────
        location /api/ {
            proxy_pass http://onscreen_backend;

            # WebSocket support (used by live-progress, SSE, etc.)
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        # ── Media streaming ──────────────────────────────────────────────────
        location /media/ {
            proxy_pass http://onscreen_backend;

            # Larger buffer for range requests; let the backend handle byte-range.
            proxy_request_buffering off;
            proxy_set_header Range  $http_range;

            # Longer read timeout for active streams.
            proxy_read_timeout 600s;
        }

        # ── Artwork (cacheable) ──────────────────────────────────────────────
        location /artwork/ {
            proxy_pass http://onscreen_backend;

            # Repeat parent security headers (add_header in a location block
            # overrides ALL parent server-block add_header directives).
            add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header X-XSS-Protection "1; mode=block" always;
            add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
            add_header Cache-Control "public, max-age=604800, immutable";
        }

        # ── SPA fallback for all other routes ────────────────────────────────
        # The Go server embeds and serves the SPA; proxy everything else to it
        # and let it handle try-files / index.html internally.
        location / {
            proxy_pass http://onscreen_backend;

            # WebSocket support for HMR in dev; harmless in production.
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
    }

    # ── WebSocket upgrade map ────────────────────────────────────────────────
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      '';
    }
}
