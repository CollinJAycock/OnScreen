name: onscreen

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: onscreen
      POSTGRES_PASSWORD: ${DB_PASS:-onscreen}
      POSTGRES_DB: onscreen
    ports:
      - "127.0.0.1:${PG_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U onscreen"]
      interval: 5s
      timeout: 3s
      retries: 10

  valkey:
    image: valkey/valkey:8-alpine
    ports:
      - "127.0.0.1:${VALKEY_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Jaeger all-in-one for local trace inspection. Only active when the
  # `tracing` compose profile is enabled:
  #   docker compose --profile tracing up
  # UI at http://localhost:16686; server sends OTLP to jaeger:4317.
  jaeger:
    image: jaegertracing/all-in-one:1.62
    profiles: ["tracing"]
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "127.0.0.1:16686:16686"  # UI
      - "127.0.0.1:4317:4317"    # OTLP gRPC

  migrate:
    image: ${ONSCREEN_IMAGE:-onscreen-server}
    entrypoint: ["/usr/local/bin/goose"]
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      -dir /migrations postgres
      "postgres://onscreen:${DB_PASS:-onscreen}@postgres:5432/onscreen?sslmode=disable" up
    restart: "no"

  server:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    depends_on:
      migrate:
        condition: service_completed_successfully
      valkey:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://onscreen:${DB_PASS:-onscreen}@postgres:5432/onscreen?sslmode=disable
      VALKEY_URL: redis://valkey:6379
      MEDIA_PATH: /media
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY required}
      TMDB_API_KEY: ${TMDB_API_KEY:-}
      # OpenTelemetry tracing config now lives in the admin Settings UI
      # (Settings → Observability). Bring up Jaeger alongside via
      # `docker compose --profile tracing up`, then point the endpoint at
      # http://jaeger:4317 from the UI.
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-7070}:7070"
      - "127.0.0.1:${DEBUG_PORT:-7071}:7071"
    volumes:
      - media_data:/media
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7070/health/live || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10

  worker:
    image: ${ONSCREEN_IMAGE:-onscreen}
    build:
      context: ..
      dockerfile: docker/Dockerfile
    entrypoint: ["/usr/local/bin/worker"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      valkey:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://onscreen:${DB_PASS:-onscreen}@postgres:5432/onscreen?sslmode=disable
      VALKEY_URL: redis://valkey:6379
      MEDIA_PATH: /media
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY required}
      TMDB_API_KEY: ${TMDB_API_KEY:-}
      WORKER_ADDR: ":7073"
      # OTel tracing config is admin-managed (Settings → Observability) and
      # read from the DB at startup; no env vars required here.
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:7074/health/ready"]
      interval: 10s
      timeout: 3s
      retries: 5
    volumes:
      - media_data:/media

volumes:
  postgres_data:
  media_data:
